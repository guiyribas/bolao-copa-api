services:
  - type: web
    name: bolao-copa-api
    runtime: node
    plan: starter
    buildCommand: yarn install --frozen-lockfile && yarn build
    startCommand: yarn start
    healthCheckPath: /api
    disk:
      name: bolao-uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: '10000'
      - key: PUBLIC_URL
        value: https://apibolao.guiribas.com
      - key: FRONTEND_URL
        value: https://bolao.guiribas.com
      - key: CRON_ENABLED
        value: 'true'
      - key: AUTO_BOOTSTRAP_PRODUCTION
        value: 'true'
      - key: DATABASE_SSL
        value: 'true'
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: 'false'
      - key: DATABASE_POOL_MIN
        value: '0'
      - key: DATABASE_URL
        fromDatabase:
          name: bolao-copa-db
          property: connectionString
      - key: APP_KEYS
        sync: false
      - key: API_TOKEN_SALT
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: TRANSFER_TOKEN_SALT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

databases:
  - name: bolao-copa-db
    plan: basic-256mb
    databaseName: bolao_copa
    user: bolao_copa
